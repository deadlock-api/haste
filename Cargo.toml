[workspace]
resolver = "2"
members = [
    "crates/*",
    "tools/*",
]

[workspace.package]
edition = "2021"

[workspace.dependencies]
# internal
haste = { path = "." }
haste_broadcast = { path = "crates/haste_broadcast", default-features = false }
haste_core = { path = "crates/haste_core" }
haste_vartype = { path = "crates/haste_vartype" }
# external
anyhow = "1.0.98"
argh = "0.1.13"
bytes = "1.10.1"
dungers = { git = "https://github.com/blukai/dungers.git", rev = "5419784ef771089369bdce5463a6cf6da35d3a79" }
dyn-clone = "1.0.19"
env_logger = "0.11.8"
expect-test = "1.5.1"
hashbrown = { version = "0.15.3", default-features = false }
http = "1.3.1"
lazy_static = "1.5.0"
log = "0.4.27"
nohash = "0.2.0"
prost = "0.13.5"
reqwest = { version = "0.12.19", default-features = false }
serde = "1.0.219"
serde_json = "1.0.140"
snap = "1.1.1"
thiserror = "2.0.12"
valveprotos = { git = "https://github.com/deadlock-api/valveprotos-rs.git", rev = "a2dd4549fe4fb3abe8c01cf4a0e3304d32682e71", features = ["gc-client", "serde", "user-msgs"] }
tokio = { version = "1.45.1", default-features = false }

# enable more optimizations in dev (/debug) builds for dependencies
[profile.dev.package."*"]
opt-level = 3

[package]
name = "haste"
version = "0.0.0"
edition.workspace = true

[dependencies]
haste_broadcast.workspace = true
haste_core.workspace = true
